name: Update Collection Calendars

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-calendars:
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            www.pointe-claire.ca:443

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Run calendar update script
        id: update
        run: python update_calendars.py

      - name: Commit and push changes
        if: steps.update.outputs.calendars_updated == 'true'
        run: |
          git config user.name  "Jordan Conway"
          git config user.email "jordan@jordanconway.com"
          git add pointe-claire-a.ics pointe-claire-b.ics .pdf_hashes.json
          git commit -m "chore: update collection calendars [skip ci]"
          git push
