name: Update Collection Calendars

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-calendars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar update script
        id: update
        run: python update_calendars.py

      - name: Commit and push changes
        if: steps.update.outputs.calendars_updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pointe-claire-a.ics pointe-claire-b.ics .pdf_hashes.json
          git commit -m "chore: update collection calendars [skip ci]"
          git push
